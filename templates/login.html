<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 — MedASR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/animations.css">
</head>
<body class="page-login">

    <div class="login-card">
        <!-- Avatar -->
        <div class="login-avatar">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
        </div>

        <h1 class="login-title" id="loginTitle">欢迎回来</h1>
        <p class="login-subtitle" id="loginSubtitle">登录 MedASR 医学知识平台</p>

        <form class="login-form" id="loginForm">
            <div class="field-group">
                <label for="username">用户名</label>
                <input type="text" id="username" class="input" placeholder="输入用户名" autocomplete="username" required>
            </div>

            <div class="field-group">
                <label for="password">密码</label>
                <input type="password" id="password" class="input" placeholder="输入密码" autocomplete="current-password" required>
            </div>

            <!-- Role selector (register mode only) -->
            <div class="field-group hidden" id="roleGroup">
                <label>选择角色</label>
                <div class="role-select">
                    <div class="role-option selected" data-role="user">普通用户</div>
                    <div class="role-option" data-role="admin">管理员</div>
                </div>
            </div>

            <p class="form-error" id="formError"></p>

            <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">登录</button>
        </form>

        <p class="form-footer" id="toggleMode">
            没有账号？<a>注册</a>
        </p>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
