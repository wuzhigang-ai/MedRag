<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 — MedASR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/animations.css">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="page-admin">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <div class="user-avatar">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
            <div class="user-info">
                <div class="user-name">张主任</div>
                <span class="badge badge-admin">管理员</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="active">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9"/>
                    <rect x="14" y="3" width="7" height="5"/>
                    <rect x="14" y="12" width="7" height="9"/>
                    <rect x="3" y="16" width="7" height="5"/>
                </svg>
                仪表盘
            </a>
            <a href="#">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <ellipse cx="12" cy="5" rx="9" ry="3"/>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
                </svg>
                文献库
            </a>
            <a href="#">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                设置
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="#" id="sidebarLogout" class="btn btn-ghost btn-full sidebar-logout">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                退出
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <div class="main-header animate-on-load">
            <h1>仪表盘</h1>
            <p>知识库状态概览</p>
        </div>

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card animate-on-load">
                <div class="stat-header">
                    <span class="stat-label">文献数</span>
                    <span class="pulse-dot green"></span>
                </div>
                <div class="stat-value" id="statTotalDocs">--</div>
                <div class="stat-sub">已索引文档</div>
            </div>
            <div class="stat-card animate-on-load">
                <div class="stat-header">
                    <span class="stat-label">文本块</span>
                    <span class="pulse-dot green"></span>
                </div>
                <div class="stat-value" id="statTotalChunks">--</div>
                <div class="stat-sub">BGE-M3 向量化</div>
            </div>
            <div class="stat-card animate-on-load">
                <div class="stat-header">
                    <span class="stat-label">索引大小</span>
                    <span class="pulse-dot green"></span>
                </div>
                <div class="stat-value" id="statIndexSize">--</div>
                <div class="stat-sub">FAISS 索引体积</div>
            </div>
            <div class="stat-card animate-on-load">
                <div class="stat-header">
                    <span class="stat-label">LightRAG</span>
                    <span class="pulse-dot yellow"></span>
                </div>
                <div class="stat-value stat-value-sm" id="statLightRAG">--</div>
                <div class="stat-sub">知识图谱状态</div>
            </div>
        </div>


        <!-- Upload Zone -->
        <div class="upload-zone animate-on-load" id="uploadZone">
            <svg class="upload-icon" viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.5 19H19a3 3 0 0 0 3-3v-2a3 3 0 0 0-3-3h-1"/>
                <path d="M5 19h1.5"/>
                <path d="M12 19h1.5"/>
                <path d="M10.5 4.5v10"/>
                <path d="M7 8l3.5-3.5L14 8"/>
            </svg>
            <p class="upload-text">拖拽 PDF 文件到此处或点击选择文件</p>
            <p class="upload-hint">仅支持 .pdf 格式，单文件上传</p>
            <p class="upload-hint upload-status" id="uploadStatus"></p>
            <input type="file" id="fileInput" accept=".pdf">
        </div>

        <!-- Upload Progress Bar -->
        <div id="uploadProgress" class="upload-progress hidden">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-steps" id="progressSteps">
                <span class="progress-step" data-step="uploading">上传中</span>
                <span class="progress-step" data-step="parsing">解析中</span>
                <span class="progress-step" data-step="indexing">索引中</span>
                <span class="progress-step" data-step="done">完成</span>
            </div>
            <span class="progress-text" id="progressText"></span>
        </div>

        <!-- Smart Chunk Preview Panel -->
        <div id="chunkPreview" class="chunk-preview hidden animate-on-load">
            <div class="cp-header">
                <div>
                    <h3>📋 智能切分预览</h3>
                    <p id="cpDocName" class="cp-doc-name"></p>
                </div>
                <div class="cp-actions">
                    <span id="cpStats" class="cp-stats"></span>
                    <button id="cpCancelBtn" class="btn btn-ghost btn-sm">取消</button>
                    <button id="cpConfirmBtn" class="btn btn-primary btn-sm">✅ 确认入库</button>
                </div>
            </div>
            <div class="cp-body">
                <div class="cp-tabs">
                    <button class="cp-tab active" data-tab="text">文本块 <span id="cpTextCount">0</span></button>
                    <button class="cp-tab" data-tab="images">图表 <span id="cpImgCount">0</span></button>
                    <button class="cp-tab" data-tab="tables">表格 <span id="cpTblCount">0</span></button>
                </div>
                <div class="cp-content" id="cpContent"></div>
            </div>
        </div>

        <!-- Upload History -->
        <div class="files-section animate-on-load">
            <div class="section-header">
                <h2>📤 上传历史</h2>
            </div>
            <table class="files-table">
                <thead>
                    <tr>
                        <th>文件名</th>
                        <th>大小</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="filesTableBody">
                    <tr>
                        <td colspan="3">
                            <div class="empty-state">暂无上传记录</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Document Library (Knowledge Base) -->
        <div class="files-section animate-on-load">
            <div class="section-header">
                <h2>📚 文献库</h2>
                <span class="badge badge-success badge-sm" id="docCountBadge">0 篇</span>
            </div>
            <table class="files-table">
                <thead>
                    <tr>
                        <th>文献名称</th>
                        <th>文本块</th>
                        <th>Section 标签</th>
                    </tr>
                </thead>
                <tbody id="docLibBody">
                    <tr>
                        <td colspan="3">
                            <div class="empty-state">加载中...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Agentic RAG Knowledge Graph -->
        <div class="files-section animate-on-load">
            <div class="section-header">
                <h2>🕸️ Agentic RAG 关系图谱</h2>
                <span class="badge badge-success badge-sm" id="graphBadge">实时</span>
            </div>
            <div class="graph-panel" id="graphPanel">
                <div class="graph-panel-info">
                    <div class="graph-info-stat">
                        <span class="graph-info-num" id="graphNodeCount">—</span>
                        <span class="graph-info-label">实体节点</span>
                    </div>
                    <div class="graph-info-stat">
                        <span class="graph-info-num" id="graphEdgeCount">—</span>
                        <span class="graph-info-label">关系边</span>
                    </div>
                    <button id="openGraphBtn" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/><path d="M12 2v4"/><path d="M12 18v4"/>
                            <path d="M4.93 4.93l2.83 2.83"/><path d="M16.24 16.24l2.83 2.83"/>
                            <path d="M2 12h4"/><path d="M18 12h4"/>
                        </svg>
                        查看 3D 关系图谱
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Knowledge Graph Modal -->
    <div id="graphModal" class="graph-modal hidden">
        <div class="graph-modal-header">
            <span id="graphStats">加载中...</span>
            <div style="display:flex;align-items:center;gap:12px;">
                <span id="graphDeltaBadge" style="display:none;color:var(--accent-glow);font-size:13px;"></span>
                <button id="closeGraphBtn" class="btn btn-ghost btn-sm">关闭</button>
            </div>
        </div>
        <div id="graphCanvas">
            <div id="graphLoader" class="graph-loader">
                <div class="graph-spinner"></div>
                <p>正在加载知识图谱...</p>
            </div>
        </div>
        <div id="graphLegend" class="graph-legend"></div>
    </div>

    <script src="/static/js/api.js"></script>
    <script type="module" src="/static/js/graph.js"></script>
    <script src="/static/js/admin.js"></script>
</body>
</html>
