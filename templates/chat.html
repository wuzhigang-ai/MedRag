<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能问答 — MedASR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/pages.css">
    <link rel="stylesheet" href="/static/css/animations.css">
</head>
<body class="page-chat">

    <!-- Left Panel: Conversations -->
    <aside class="chat-sidebar">
        <div class="sidebar-top">
            <button class="btn btn-primary btn-full" id="newConvBtn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                新对话
            </button>
        </div>
        <div class="sidebar-conversations" id="convList">
            <!-- Populated by JS -->
        </div>
    </aside>

    <!-- Right Panel: Chat Area -->
    <div class="chat-main">
        <!-- Chat Header -->
        <div class="chat-header">
            <span class="current-title" id="currentTitle">新对话</span>
            <a href="/admin" class="btn btn-ghost btn-sm chat-admin-link">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="9"/>
                    <rect x="14" y="3" width="7" height="5"/>
                    <rect x="14" y="12" width="7" height="9"/>
                    <rect x="3" y="16" width="7" height="5"/>
                </svg>
                管理后台
            </a>
        </div>

        <!-- Message Area -->
        <div class="chat-messages" id="chatMessages">
            <!-- Populated by JS -->
        </div>

        <!-- Empty State -->
        <div class="chat-empty" id="chatEmpty">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
            </div>
            <h2>向 MedASR 提问医学问题</h2>
            <p>基于 Agentic RAG 的多步推理引擎，自动检索、验证、综合医学证据</p>
            <div class="example-chips">
                <span class="example-chip" data-query="TBAD的诊断标准是什么？">TBAD的诊断标准是什么？</span>
                <span class="example-chip" data-query="Stanford A型和B型主动脉夹层的治疗策略有何不同？">Stanford A型 vs B型治疗策略</span>
                <span class="example-chip" data-query="急性TBAD患者应该使用什么降压药物？">急性TBAD降压药物选择</span>
                <span class="example-chip" data-query="主动脉夹层的分型分期体系有哪些？">主动脉夹层分型分期体系</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <div class="input-row">
                <textarea
                    id="chatInput"
                    placeholder="输入医学问题，按 Enter 发送，Shift+Enter 换行..."
                    rows="1"
                ></textarea>
                <button class="btn-send" id="sendBtn" title="发送">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <p class="input-hint">MedASR 使用 AI 生成答案，请务必验证关键信息</p>
        </div>
    </div>

    <script src="/static/js/api.js"></script>
    <script src="/static/js/chat.js"></script>
</body>
</html>
